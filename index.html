<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#333">

<title>Horse App</title>

<style>
body { font-family: Arial; margin:0; background:#f2f2f2; text-align:center; }
.header { background:#333;color:white;padding:12px;font-weight:bold; }
#totalGeneral { background:white;padding:10px;font-weight:bold;border-bottom:1px solid #ccc; }
.legend { background:#fff;padding:6px; }
.menu { display:flex; }
.menu button { flex:1;padding:10px;border:none;background:#444;color:white; }
.area { padding:15px;overflow-x:auto; }
.row { display:flex; gap:4px; }
.cell { width:28px;height:28px;border:1px solid #ccc;font-size:10px;display:flex;align-items:center;justify-content:center;background:white; }
.tackron { background:red;color:white;font-weight:bold; }
.vacio { background:skyblue;color:white;font-weight:bold; }
.btn { margin:10px;padding:8px 15px;border:none;background:#333;color:white;border-radius:6px; }
.totales { margin:15px;background:white;padding:10px;border-radius:10px;display:inline-block; }
</style>
</head>

<body>

<div class="header">Horse App 🐴</div>
<div id="totalGeneral"></div>

<div class="legend">
🔴 T = Tackron | 🔵 V = Vacío | Número = Aserrín
</div>

<div class="menu">
  <button onclick="cambiar('north')">North</button>
  <button onclick="cambiar('sand')">Sand Hill</button>
  <button onclick="cambiar('gp')">Grand Prix</button>
</div>

<div class="area" id="area"></div>

<button class="btn" onclick="resetear()">Resetear</button>
<div id="status" style="font-size:12px;color:green;"></div>
<div class="totales" id="totales"></div>

<script>

// 🔥 esto hace que funcione como app offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let actual="north";
let total={ north:114, sand:208, gp:176 };
let data={};

function cambiar(area){
  actual=area;
  data=JSON.parse(localStorage.getItem(actual))||{};
  document.getElementById("area").innerHTML="";
  crear();
  calcular();
  calcularGeneral();
}

function crear(){
  let cont=document.getElementById("area");
  if(actual=="north") crearNorth(cont);
  if(actual=="sand") crearSand(cont);
  if(actual=="gp") crearGP(cont);
}

/* ===== NORTH ===== */

function crearNorth(cont){

  let container=document.createElement("div");
  container.style.display="flex";
  container.style.gap="120px";
  container.style.minWidth="900px";

  let left=document.createElement("div");
  left.style.display="flex";
  left.style.flexDirection="column";
  left.style.gap="15px";

  let right=document.createElement("div");
  right.style.display="flex";
  right.style.flexDirection="column";
  right.style.gap="15px";

  left.appendChild(crearVertical("C",10));
  left.appendChild(crearVertical("B",20));
  left.appendChild(crearVertical("A",20));

  right.appendChild(crearHorizontal("F",10));
  right.appendChild(crearHorizontal("E",22));
  right.appendChild(crearHorizontal("D",22));

  container.appendChild(left);
  container.appendChild(right);

  cont.appendChild(container);
}

function crearVertical(letra,cantidad){
  let block=document.createElement("div");

  let title=document.createElement("div");
  title.innerText=letra;
  title.style.fontWeight="bold";

  let col=document.createElement("div");

  let mitad=cantidad/2;

  for(let i=1;i<=mitad;i++){
    let row=document.createElement("div");
    row.className="row";

    celda(letra+i,row);
    celda(letra+(cantidad+1-i),row);

    col.appendChild(row);
  }

  block.appendChild(title);
  block.appendChild(col);

  return block;
}

function crearHorizontal(letra,cantidad){
  let block=document.createElement("div");

  let title=document.createElement("div");
  title.innerText=letra;
  title.style.fontWeight="bold";

  let top=document.createElement("div");
  top.className="row";

  let bottom=document.createElement("div");
  bottom.className="row";

  let mitad=cantidad/2;

  for(let i=1;i<=mitad;i++) celda(letra+i,top);
  for(let i=cantidad;i>mitad;i--) celda(letra+i,bottom);

  block.appendChild(title);
  block.appendChild(top);
  block.appendChild(bottom);

  return block;
}

/* ===== SAND ===== */

function crearSand(cont){

  let grupos=[
    ["AA","BB","CC","DD"],
    ["EE","FF","GG","HH"],
    ["II","JJ","KK","LL"]
  ];

  grupos.forEach(g=>{
    let fila=document.createElement("div");

    fila.style.display="flex";
    fila.style.gap="40px";
    fila.style.marginBottom="40px";

    g.forEach(l=>{
      let col=document.createElement("div");
      col.style.display="flex";
      col.style.flexDirection="column";
      col.style.alignItems="center";

      let t=document.createElement("div");
      t.innerText=l;
      t.style.fontWeight="bold";

      let r1=document.createElement("div");
      r1.className="row";

      let r2=document.createElement("div");
      r2.className="row";

      for(let i=1;i<=8;i++) celda(l+i,r1);
      for(let i=16;i>=9;i--) celda(l+i,r2);

      col.appendChild(t);
      col.appendChild(r1);
      col.appendChild(r2);

      fila.appendChild(col);
    });

    cont.appendChild(fila);
  });

  let lot=document.createElement("div");
  lot.innerText="DAY USE LOT";
  lot.style.border="2px solid black";
  lot.style.height="90px";
  lot.style.width="220px";
  lot.style.margin="30px auto";
  lot.style.display="flex";
  lot.style.alignItems="center";
  lot.style.justifyContent="center";

  cont.appendChild(lot);

  let title=document.createElement("div");
  title.innerText="MM";
  title.style.fontWeight="bold";

  cont.appendChild(title);

  for(let i=1;i<=8;i++){
    let row=document.createElement("div");
    row.className="row";

    celda("MM"+i,row);
    celda("MM"+(17-i),row);

    cont.appendChild(row);
  }
}

/* ===== GP ===== */

function crearGP(cont){

  let wrapper=document.createElement("div");
  wrapper.style.display="flex";
  wrapper.style.gap="20px";

  let arena=document.createElement("div");
  arena.innerText="Grand Prix Arena";
  arena.style.width="180px";
  arena.style.height="420px";
  arena.style.border="2px solid black";
  arena.style.display="flex";
  arena.style.alignItems="center";
  arena.style.justifyContent="center";

  wrapper.appendChild(arena);

  let stalls=document.createElement("div");

  let filas=["J","K","L","M","N","O","P","Q","R","S","T"];

  filas.forEach(f=>{
    let block=document.createElement("div");

    let label=document.createElement("div");
    label.innerText=f;
    label.style.fontWeight="bold";

    let r1=document.createElement("div");
    r1.className="row";

    let r2=document.createElement("div");
    r2.className="row";

    for(let i=1;i<=8;i++) celda(f+i,r1);
    for(let i=16;i>=9;i--) celda(f+i,r2);

    block.appendChild(label);
    block.appendChild(r1);
    block.appendChild(r2);

    stalls.appendChild(block);
  });

  wrapper.appendChild(stalls);
  cont.appendChild(wrapper);
}

/* ===== CELDA ===== */

function celda(id,row){
  let d=document.createElement("div");

  if(!(id in data)) data[id]=0;

  actualizar(d,id);

  d.onclick=()=>{
    data[id]=(data[id]+1)%3;
    actualizar(d,id);
    guardar();
    calcular();
    calcularGeneral();
  }

  row.appendChild(d);
}

function actualizar(d,id){
  let v=data[id]||0;

  if(v==1){ d.className="cell tackron"; d.innerText="T"; }
  else if(v==2){ d.className="cell vacio"; d.innerText="V"; }
  else{ d.className="cell"; d.innerText=id; }
}

function guardar(){
  localStorage.setItem(actual, JSON.stringify(data));
  document.getElementById("status").innerText="✔️ Guardado";
}

function calcular(){
  let t=0,v=0;
  Object.values(data).forEach(x=>{ if(x==1)t++; if(x==2)v++; });
  let as=total[actual]-t-v;

  let c=(as+t)*15;
  let p=as*10;

  document.getElementById("totales").innerHTML=
`Aserrín: ${as} | Tackron: ${t} | Vacíos: ${v}<br><br>
Cobras: $${c}<br>
Pagas: $${p}<br>
Ganancia: $${c-p}`;
}

function calcularGeneral(){

  let areas=["north","sand","gp"];

  let A=0,T=0,V=0,C=0,P=0,G=0;

  areas.forEach(a=>{
    let d=JSON.parse(localStorage.getItem(a))||{};
    let t=0,v=0;

    Object.values(d).forEach(x=>{
      if(x==1)t++;
      if(x==2)v++;
    });

    let as=total[a]-t-v;
    let c=(as+t)*15;
    let p=as*10;

    A+=as; T+=t; V+=v;
    C+=c; P+=p; G+=(c-p);
  });

  document.getElementById("totalGeneral").innerHTML=
`🌎 TOTAL GENERAL<br>
Aserrín: ${A} | Tackron: ${T} | Vacíos: ${V}<br><br>
Cobras: $${C}<br>
Pagas: $${P}<br>
Ganancia: $${G}`;
}

function resetear(){
  if(confirm("¿Borrar esta área?")){
    localStorage.removeItem(actual);
    location.reload();
  }
}

cambiar("north");

</script>

</body>
</html>
