<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horse App</title>

<style>
body { font-family: Arial; margin:0; background:#f2f2f2; text-align:center; }

.header { background:#333;color:white;padding:12px;font-weight:bold; }

#totalGeneral {
  background:white;
  padding:10px;
  font-weight:bold;
  border-bottom:1px solid #ccc;
}

.legend { background:#fff;padding:6px; }

.menu { display:flex; }
.menu button { flex:1;padding:10px;border:none;background:#444;color:white; }

.area { padding:15px;overflow-x:auto; }

.row { display:flex; gap:4px; }

.cell {
  width:28px;height:28px;border:1px solid #ccc;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
}

.tackron { background:red;color:white;font-weight:bold; }
.vacio { background:skyblue;color:white;font-weight:bold; }

.btn { margin:10px;padding:8px 15px;border:none;background:#333;color:white;border-radius:6px; }

.totales {
  margin:15px;
  background:white;
  padding:10px;
  border-radius:10px;
  display:inline-block;
}
</style>
</head>

<body>

<div class="header">Horse App 🐴</div>

<div id="totalGeneral"></div>

<div class="legend">
🔴 T = Tackron | 🔵 V = Vacío | Número = Aserrín
</div>

<div class="menu">
  <button onclick="cambiar('north')">North</button>
  <button onclick="cambiar('sand')">Sand Hill</button>
  <button onclick="cambiar('gp')">Grand Prix</button>
</div>

<div class="area" id="area"></div>

<button class="btn" onclick="resetear()">Resetear</button>

<div id="totales" class="totales"></div>

<script>

let actual="north";
let total={ north:114, sand:208, gp:176 };
let data={};

function cambiar(area){
  actual=area;
  data=JSON.parse(localStorage.getItem(area))||{};
  document.getElementById("area").innerHTML="";
  crear();
  calcular();
  calcularGeneral();
}

// ===== CELDA =====
function celda(id,row){
  let d=document.createElement("div");

  if(!(id in data)) data[id]=0;

  actualizar(d,id);

  d.onclick=()=>{
    data[id]=(data[id]+1)%3;
    actualizar(d,id);
    guardar();
    calcular();
    calcularGeneral();
  }

  row.appendChild(d);
}

function actualizar(d,id){
  let v=data[id]||0;

  if(v==1){ d.className="cell tackron"; d.innerText="T"; }
  else if(v==2){ d.className="cell vacio"; d.innerText="V"; }
  else{ d.className="cell"; d.innerText=id; }
}

function guardar(){
  localStorage.setItem(actual, JSON.stringify(data));
}

// ===== VERTICAL =====
function crearVertical(letra,cantidad){

  let block=document.createElement("div");

  let title=document.createElement("div");
  title.innerText=letra;
  title.style.fontWeight="bold";

  let col=document.createElement("div");

  let mitad=cantidad/2;
  let izq=0, der=0;

  for(let i=1;i<=mitad;i++){

    let row=document.createElement("div");
    row.className="row";

    let id1=letra+i;
    let id2=letra+(cantidad+1-i);

    celda(id1,row);
    celda(id2,row);

    if((data[id1]||0)==0) izq++;
    if((data[id2]||0)==0) der++;

    col.appendChild(row);
  }

  let totalRow=document.createElement("div");
  totalRow.innerHTML = `${izq} ${der} | ${izq+der}`;
  totalRow.style.fontWeight="bold";

  block.appendChild(title);
  block.appendChild(col);
  block.appendChild(totalRow);

  return block;
}

// ===== HORIZONTAL =====
function crearHorizontal(letra,cantidad){

  let block=document.createElement("div");

  let title=document.createElement("div");
  title.innerText=letra;
  title.style.fontWeight="bold";

  let topRow=document.createElement("div");
  let bottomRow=document.createElement("div");

  topRow.style.display="flex";
  bottomRow.style.display="flex";

  let top=document.createElement("div");
  let bottom=document.createElement("div");

  top.className="row";
  bottom.className="row";

  let mitad=cantidad/2;
  let topCount=0, bottomCount=0;

  for(let i=1;i<=mitad;i++){
    let id=letra+i;
    celda(id,top);
    if((data[id]||0)==0) topCount++;
  }

  for(let i=cantidad;i>mitad;i--){
    let id=letra+i;
    celda(id,bottom);
    if((data[id]||0)==0) bottomCount++;
  }

  let numTop=document.createElement("div");
  numTop.innerText=topCount;
  numTop.style.fontWeight="bold";
  numTop.style.marginRight="5px";

  let numBottom=document.createElement("div");
  numBottom.innerText=bottomCount;
  numBottom.style.fontWeight="bold";
  numBottom.style.marginRight="5px";

  topRow.appendChild(numTop);
  topRow.appendChild(top);

  bottomRow.appendChild(numBottom);
  bottomRow.appendChild(bottom);

  let total=document.createElement("div");
  total.innerHTML = `<div style="width:30px;text-align:center;">
  <hr style="margin:2px 0;">
  ${topCount+bottomCount}
  </div>`;

  block.appendChild(title);
  block.appendChild(topRow);
  block.appendChild(bottomRow);
  block.appendChild(total);

  return block;
}

// ===== NORTH =====
function crearNorth(cont){

  let container=document.createElement("div");
  container.style.display="flex";
  container.style.gap="100px";

  let left=document.createElement("div");
  let right=document.createElement("div");

  left.appendChild(crearVertical("C",10));
  left.appendChild(crearVertical("B",20));
  left.appendChild(crearVertical("A",20));

  right.appendChild(crearHorizontal("F",10));
  right.appendChild(crearHorizontal("E",22));
  right.appendChild(crearHorizontal("D",22));

  container.appendChild(left);
  container.appendChild(right);

  cont.appendChild(container);
}

// ===== SAND =====
function crearSand(cont){

  let grupos=[
    ["AA","BB","CC","DD"],
    ["EE","FF","GG","HH"],
    ["II","JJ","KK","LL"]
  ];

  grupos.forEach(g=>{
    let fila=document.createElement("div");
    fila.style.display="flex";
    fila.style.gap="40px";

    g.forEach(l=>{
      fila.appendChild(crearHorizontal(l,16));
    });

    cont.appendChild(fila);
  });

  // ===== MM CORREGIDO =====
  let wrapper=document.createElement("div");
  wrapper.style.display="inline-block";

  let title=document.createElement("div");
  title.innerText="MM";
  title.style.fontWeight="bold";
  title.style.textAlign="left";

  wrapper.appendChild(title);

  let izq=0, der=0;
  let col=document.createElement("div");

  for(let i=1;i<=8;i++){
    let row=document.createElement("div");
    row.className="row";

    let id1="MM"+i;
    let id2="MM"+(17-i);

    celda(id1,row);
    celda(id2,row);

    if((data[id1]||0)==0) izq++;
    if((data[id2]||0)==0) der++;

    col.appendChild(row);
  }

  wrapper.appendChild(col);

  let total=document.createElement("div");
  total.innerHTML = `${izq} ${der} | ${izq+der}`;
  total.style.fontWeight="bold";
  total.style.textAlign="left";

  wrapper.appendChild(total);

  cont.appendChild(wrapper);
}

// ===== GP =====
function crearGP(cont){

  let wrapper=document.createElement("div");
  wrapper.style.display="flex";
  wrapper.style.gap="20px";

  let arena=document.createElement("div");
  arena.style.width="180px";
  arena.style.height="420px";
  arena.style.border="2px solid black";
  arena.style.display="flex";
  arena.style.alignItems="center";
  arena.style.justifyContent="center";
  arena.innerText="Grand Prix Arena";

  wrapper.appendChild(arena);

  let stalls=document.createElement("div");

  let filas=["J","K","L","M","N","O","P","Q","R","S","T"];

  filas.forEach(f=>{
    stalls.appendChild(crearHorizontal(f,16));
  });

  wrapper.appendChild(stalls);
  cont.appendChild(wrapper);
}

// ===== CALCULOS =====
function calcular(){

  let tack=0,vac=0;

  Object.values(data).forEach(v=>{
    if(v==1)tack++;
    if(v==2)vac++;
  });

  let aserrin=total[actual]-tack-vac;

  let cobro=(aserrin+tack)*15;
  let pago=aserrin*10;
  let ganancia=cobro-pago;

  document.getElementById("totales").innerHTML=
`Aserrín: ${aserrin} | Tackron: ${tack} | Vacíos: ${vac}<br><br>
Cobras: $${cobro}<br>
Pagas: $${pago}<br>
Ganancia: $${ganancia}`;
}

function calcularGeneral(){

  let areas=["north","sand","gp"];

  let totalA=0,totalT=0,totalV=0;
  let totalC=0,totalP=0,totalG=0;

  areas.forEach(a=>{
    let d=JSON.parse(localStorage.getItem(a))||{};

    let t=0,v=0;

    Object.values(d).forEach(x=>{
      if(x==1)t++;
      if(x==2)v++;
    });

    let as=total[a]-t-v;

    let c=(as+t)*15;
    let p=as*10;
    let g=c-p;

    totalA+=as;
    totalT+=t;
    totalV+=v;
    totalC+=c;
    totalP+=p;
    totalG+=g;
  });

  document.getElementById("totalGeneral").innerHTML=
`🌎 TOTAL GENERAL<br>
Aserrín: ${totalA} | Tackron: ${totalT} | Vacíos: ${totalV}<br><br>
Cobras: $${totalC}<br>
Pagas: $${totalP}<br>
Ganancia: $${totalG}`;
}

function resetear(){
  if(confirm("¿Borrar esta área?")){
    localStorage.removeItem(actual);
    location.reload();
  }
}

function crear(){
  let cont=document.getElementById("area");

  if(actual=="north") crearNorth(cont);
  if(actual=="sand") crearSand(cont);
  if(actual=="gp") crearGP(cont);
}

cambiar("north");

</script>

</body>
</html>
